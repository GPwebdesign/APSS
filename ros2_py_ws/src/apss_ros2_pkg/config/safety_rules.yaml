global:
  publish_rate_hz: 0.5
  grace_period_s: 30
  charging_topic: /battery
  charging_field: current
  charging_threshold: -0.05

rules:
  - id: battery_voltage
    source: battery
    topic: /battery
    msg_type: sensor_msgs/BatteryState
    field: voltage
    type: threshold_low
    active_when_charging: false
    watchdog_timeout_s: 10
    staleness_s: 10
    thresholds:
      - value: 11.45
        level: LOW
        message: "Battery voltage below LOW threshold"
      - value: 11.20
        level: CRITICAL
        message: "Battery voltage below CRITICAL threshold"
      - value: 10.20
        level: EMERGENCY
        message: "Battery voltage below EMERGENCY threshold"

  - id: tof_front_frozen
    source: tof_front
    topic: /tof/front
    msg_type: sensor_msgs/Range
    field: range
    type: frozen
    frozen_samples: 5
    frozen_tolerance: 0.001
    watchdog_timeout_s: 5
    staleness_s: 5
    level: ERROR
    message: "TOF front frozen — possible I2C lockup"

  - id: tof_left_frozen
    source: tof_left
    topic: /tof/left
    msg_type: sensor_msgs/Range
    field: range
    type: frozen
    frozen_samples: 5
    frozen_tolerance: 0.001
    watchdog_timeout_s: 5
    staleness_s: 5
    level: ERROR
    message: "TOF left frozen — possible I2C lockup"

  - id: tof_right_frozen
    source: tof_right
    topic: /tof/right
    msg_type: sensor_msgs/Range
    field: range
    type: frozen
    frozen_samples: 5
    frozen_tolerance: 0.001
    watchdog_timeout_s: 5
    staleness_s: 5
    level: ERROR
    message: "TOF right frozen — possible I2C lockup"

alarm_node:
  language: it          # it | en
  voice_enabled: true
  log_path: ~/Workspaces/rosmaster_project/logs/alarm_history.json
  log_max_entries: 20
  alsa_device: plughw:Headphones
  voice_models:
    it: ~/piper-voices/it_IT-paola-medium.onnx
    en: ~/piper-voices/en_US-amy-medium.onnx

  source_labels:
    it:
      tof_front: "sensore prossimità frontale"
      tof_left: "sensore prossimità sinistra"
      tof_right: "sensore prossimità destra"
      battery: "batteria"
    en:
      tof_front: "front proximity sensor"
      tof_left: "left proximity sensor"
      tof_right: "right proximity sensor"
      battery: "battery"

  templates:
    it:
      LOW: "Attenzione {source_label}. Valore attuale {value}."
      CRITICAL: "Attenzione critica {source_label}. {message}."
      EMERGENCY: "Emergenza {source_label}. {message}."
      ERROR: "{source_label} non risponde."
    en:
      LOW: "Warning {source_label}. Current value {value}."
      CRITICAL: "Critical alert {source_label}. {message}."
      EMERGENCY: "Emergency {source_label}. {message}."
      ERROR: "{source_label} not responding."

  beep_patterns:
    LOW:       {repeat_s: 30}
    CRITICAL:  {repeat_s: 10}
    EMERGENCY: {repeat_s: 0}
    ERROR:     {repeat_s: 60}
